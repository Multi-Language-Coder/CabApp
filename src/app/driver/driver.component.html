<html>
    <head>
        <title>Driver UI</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

    </head>
    <body>
        <h2 class="display-1">User Requests</h2>
        <div id="googleMap"></div>
        <table class="table table-bordered table-hover table-dark table-striped">
            <thead>
                <th>User</th>
                <th>From Location</th>
                <th>To Location</th>
                <th>Post Map</th>
                <th>Accept</th>
                <th>Deny</th>
            </thead>
            <tbody>
                @for(request of this.userrequests; track userrequests.keys){
                    <tr id="{{request.cabid}}">
                        <td>{{request.userrequested}}</td>
                        <td>{{request.fromLocation}}</td>
                        <td>{{request.toLocation}}</td>
                        <td><button class="btn btn-dark postMap">Post Map</button></td>
                        <td><button class="btn btn-success acceptRequest">Accept</button></td>
                        <td><button class="btn btn-danger denyRequest">Deny</button></td>
                    </tr>
                }
                
            </tbody>
        </table>
    </body>
</html>
